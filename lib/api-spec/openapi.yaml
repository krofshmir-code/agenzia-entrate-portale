openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Agenzia delle Entrate - API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: templates
    description: Template management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a new document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocument"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List all templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [documents]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [pdf, excel, word]
        description:
          type: string
        fileSize:
          type: string
        downloadUrl:
          type: string
        uploadedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - category
        - type
        - description
        - fileSize
        - downloadUrl
        - uploadedAt

    CreateDocument:
      type: object
      properties:
        title:
          type: string
        category:
          type: string
        type:
          type: string
          enum: [pdf, excel, word]
        description:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - title
        - category
        - type
        - description

    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
        hasLogo:
          type: boolean
        hasSignature:
          type: boolean
        previewUrl:
          type: string
        downloadUrl:
          type: string
      required:
        - id
        - name
        - description
        - category
        - hasLogo
        - hasSignature

    DashboardStats:
      type: object
      properties:
        totalDocuments:
          type: integer
        totalTemplates:
          type: integer
        recentDownloads:
          type: integer
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalDocuments
        - totalTemplates
        - recentDownloads
        - categories
