kind = "web"
previewPath = "/"
title = "Agenzia delle Entrate - Portale"
version = "1.0.0"
id = "artifacts/agenzia-entrate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25257
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/agenzia-entrate run dev"

[services.env]
PORT = "25257"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/agenzia-entrate", "run", "build"]
publicDir = "artifacts/agenzia-entrate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
