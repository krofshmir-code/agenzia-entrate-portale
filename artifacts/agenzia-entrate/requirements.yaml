packages:
  "framer-motion": "Animations and page transitions"
  "recharts": "Dashboard analytics charts and data visualization"
  "lucide-react": "Icons for the interface"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility function to efficiently merge Tailwind CSS classes"
  "date-fns": "For formatting dates"
  "react-hook-form": "Form state management"
  "@hookform/resolvers": "Zod resolver for react-hook-form"
  "zod": "Schema validation"

images:
  - path: "artifacts/agenzia-entrate/public/images/republic-emblem.png"
    description: "Minimalist geometric illustration of the Italian Republic emblem star and cogwheel in solid deep blue on transparent background, official institutional style"
    aspect_ratio: "1:1"
  - path: "artifacts/agenzia-entrate/public/images/hero-bg.png"
    description: "Abstract soft gradient mesh in deep blue and white, professional corporate subtle waves, clean institutional background"
    aspect_ratio: "16:9"

notes:
  - Uses @workspace/api-client-react for TanStack query hooks and types
  - Uses Tailwind v4 native CSS variables
